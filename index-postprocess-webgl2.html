<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebGL2 Doom — Post Processing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toolbar">
  <span class="c-filter">filter: <select id="pp"></select></span>
  <span class="c-info sep">|</span>
  <span class="c-info"><a id="src" href="" target="_blank" rel="noopener">src</a></span>
  <span class="c-info">author: <a id="author" href="" target="_blank" rel="noopener"></a></span>
  <span class="c-info">license: <a id="license" href="" target="_blank" rel="noopener"></a></span>
  <span class="c-help spacer"></span>
  <a class="c-help" id="help" href="https://github.com/greggman/WebGPU-DOOM/blob/main/docs/post-process-glsl.md" target="_blank" rel="noopener" title="Shader inputs &amp; docs">?</a>
  <button class="c-edit" id="editbtn">edit</button>
</div>
<div id="stage">
  <canvas id="screen" tabindex="0"></canvas>
  <div id="splitter"></div>
  <div id="editor">
    <div id="editor-bar">
      <button id="savebtn">save &amp; copy URL</button>
      <span id="editor-status"></span>
    </div>
    <div id="editor-host"></div>
    <div id="editor-errors" hidden></div>
  </div>
</div>
<script type="module">
// Stub out Stats for the postprocess page
window.Stats = class Stats {
  constructor() { this.dom = document.createElement('div'); }
  begin() {}
  end() { return 0; }
  showPanel() {}
};
</script>
<script type="module" src="./dist/doom-postprocess-webgl2.js"></script>
</body>
</html>
